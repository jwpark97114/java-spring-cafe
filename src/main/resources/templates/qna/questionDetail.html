<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cafe - Question Detail</title>
    <th:block th:replace="~{fragments/header :: header-css}"></th:block>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfaf6;
            color: #3e2723;
            display: flex;
            flex-direction: column;
            margin: 0;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        .article-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(109, 76, 65, 0.1);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        .article-meta {
            font-size: 0.9rem;
            font-weight: bold;
            color: #8d6e63;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        h1 {
            margin: 0 0 1.5rem 0;
            color: #4e342e;
            font-size: 2rem;
            line-height: 1.3;
            border-bottom: 2px solid #efebe9;
            padding-bottom: 1rem;
        }
        .article-content {
            font-size: 1.1rem;
            color: #5d4037;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            white-space: pre-wrap;
        }

        /* --- New Button Styles --- */
        .action-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .comment-header {
            display: flex;
            justify-content: space-between; /* This pushes the items to opposite sides */
            align-items: center; /* Vertically centers them */
            margin-bottom: 0.8rem;
            border-bottom: 1px solid #efebe9;
            padding-bottom: 0.5rem;
        }

        .comment-author {
            font-size: 0.95rem;
            font-weight: bold;
            color: #8d6e63;
        }

        .comment-time {
            font-size: 0.85rem;
            color: #a1887f; /* A slightly lighter, muted brown */
        }
        .btn-return {
            display: inline-block;
            text-decoration: none;
            background-color: #8d6e63;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-return:hover {
            background-color: #6d4c41;
        }
        .btn-edit {
            display: inline-block;
            text-decoration: none;
            background-color: #5d4037; /* Darker brown for edit */
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-edit:hover {
            background-color: #3e2723;
        }
        .btn-delete-comment {
            background: none;
            color: #d32f2f; /* Muted red */
            border: none;
            padding: 0;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.3s;
            font-family: inherit;
        }

        .btn-delete-comment:hover {
            color: #b71c1c;
        }
        .btn-delete {
            background-color: #d32f2f; /* Muted red for delete */
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 1rem;
            font-family: inherit;
        }
        .btn-delete:hover {
            background-color: #b71c1c;
        }
        .delete-form {
            margin: 0;
            padding: 0;
        }
        /* Ensure the form doesn't force a new line */
        .delete-comment-form {
            display: inline-flex;
            margin: 0;
            padding: 0;
            align-items: center;
        }

        /* Adjust the gap specifically for the items inside the actions header */
        .comment-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem; /* Creates a nice space between the time and the button */
        }
        /* --- Comments Section Styles --- */
        .comments-section {
            margin-top: 3rem;
            border-top: 2px solid #efebe9;
            padding-top: 2rem;
        }
        .comments-section h2 {
            font-size: 1.5rem;
            color: #4e342e;
            margin-bottom: 1.5rem;
            margin-top: 0;
            border: none;
            padding: 0;
        }
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .comment-form textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #d7ccc8;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            box-sizing: border-box;
            background-color: #fdfaf6;
            color: #3e2723;
        }
        .comment-form textarea:focus {
            outline: none;
            border-color: #8d6e63;
            box-shadow: 0 0 0 2px rgba(141, 110, 99, 0.2);
        }
        .btn-comment {
            align-self: flex-end;
            background-color: #8d6e63;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 1rem;
            font-family: inherit;
        }
        .btn-comment:hover {
            background-color: #6d4c41;
        }
        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .comment-card {
            background-color: #fdfaf6;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid #8d6e63;
        }
        .comment-meta {
            font-size: 0.9rem;
            font-weight: bold;
            color: #8d6e63;
            margin-bottom: 0.5rem;
        }
        .comment-body {
            font-size: 1rem;
            color: #5d4037;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .no-comments {
            color: #a1887f;
            font-style: italic;
            text-align: center;
            padding: 1rem 0;
        }
        .error-banner {
            background-color: #ffebee;
            color: #c62828;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid #ef9a9a;
            text-align: left;
        }
    </style>
    <script th:inline="javascript">
        // Thymeleaf writes the logged-in user's ID into this JS variable
        var logInUserId = [[${session.currentUser != null ? session.currentUser.id : null}]];
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<div th:replace="~{fragments/header :: main-header}"></div>
<div class="main-content">
    <div class="article-card">

        <div class="article-meta">
            Question #<span th:text="${article.id}">1</span>
            By <span th:text="${article.author}" style="color: #4e342e;">doe</span>
        </div>
        <h1 th:text="${article.title}">Sample Question Title</h1>
        <div class="article-content" th:text="${article.content}">Content here</div>

        <div class="comments-section">
            <h2>Comments</h2>

            <form class="comment-form" th:action="@{/api/comment/{id}(id=${article.id})}" method="post">
                <textarea name="commentContent" placeholder="Leave a comment..." required></textarea>
                <button type="submit" class="btn-comment">Post Comment</button>
            </form>

            <div class="comment-list">
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <button id="btn-load-more" class="btn-return" style="display: none; background-color: #6d4c41; border: none; cursor: pointer;">
                    View More Comments (+5)
                </button>
            </div>
        </div>
    </div>
</div>

<script type="text/template" id="commentTemplate">
    <div class="comment-card" id="reply-{3}">
        <div class="comment-header">
            <span class="comment-author">{0}</span>
            <div class="comment-actions">
                <span class="comment-time">{1}</span>
                <form class="delete-comment-form" action="/api/comment/{4}/{3}" method="POST">
                    <button type="submit" class="btn-delete-comment" style="display:none;">Delete</button>
                </form>
            </div>
        </div>
        <div class="comment-body">{2}</div>
    </div>
</script>

<script th:inline="javascript">
    // 1. GLOBAL VARIABLES: Defined at the top so every function can see them
    var logInUserId = [[${session.currentUser != null ? session.currentUser.id : null}]];
    // 1. GLOBAL STATE: Keep track of the current page [cite: 2026-04-02]
    var currentCommentPage = 0;
    var articleId = [[${article.id}]];

    $(document).ready(function() {
        // Load the first 5 comments (Page 0)
        loadComments();

        // Listen for the "Post" button
        $(".btn-comment").click(addComment);

        // NEW: Listen for the "Load More" button [cite: 2026-04-02]
        $("#btn-load-more").click(function() {
            loadComments();
        });
    });

    // 2. UPDATED LOAD FUNCTION: Handles Slice metadata [cite: 2026-03-14, 2026-04-02]
    function loadComments() {
        $.ajax({
            type: 'get',
            url: `/api/comment/${articleId}?page=${currentCommentPage}`, // Pass the page number [cite: 2026-04-02]
            dataType: 'json',
            success: function(data) {
                data.content.forEach(function(comment) {
                    renderComment(comment, "append");
                });

                currentCommentPage++;

                // 'hasNext' doesn't exist in the JSON; use '!data.last' instead [cite: 2026-04-02]
                if (!data.last) {
                    $("#btn-load-more").show();
                } else {
                    $("#btn-load-more").hide();
                }
            }
        });
    }

    // Standard string formatter
    String.prototype.format = function() {
        var args = arguments;
        return this.replace(/{(\d+)}/g, function(match, number) {
            return typeof args[number] != 'undefined' ? args[number] : match;
        });
    };

    // 2. THE UNIFIED RENDERER: The only place where HTML is actually built
    function renderComment(data, method = "append") {
        // A. Format the date into something human
        var dateObj = new Date(data.createdAt);
        var humanTime = dateObj.toLocaleString('ko-KR', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', hour12: false
        });

        // B. Fill the template with ALL 5 required parameters
        var templateHtml = $("#commentTemplate").html();
        var formattedHtml = templateHtml.format(
            data.user_id,   // {0} - Author
            humanTime,      // {1} - Formatted Date
            data.reply,     // {2} - Content
            data.id,        // {3} - Reply ID for the URL
            articleId       // {4} - Article ID for the URL
        );

        // C. Convert string to jQuery object and perform security check
        var commentElement = $(formattedHtml);
        if (logInUserId !== null && logInUserId === data.user_id) {
            commentElement.find(".btn-delete-comment").show();
        }

        // D. Inject into the page
        if (method === "prepend") {
            $(".comment-list").prepend(commentElement);
        } else {
            $(".comment-list").append(commentElement);
        }
    }


    // 4. POST: Sends new data to MySQL
    function addComment(e) {
        e.preventDefault();
        var form = $(".comment-form");

        $.ajax({
            type: 'post',
            url: form.attr("action"),
            data: form.serialize(),
            dataType: 'json',
            error: function() { alert("Error: Could not post comment."); },
            success: function(data) {
                // Instead of manual code, we use our unified renderer!
                renderComment(data, "append");

                $("textarea[name=commentContent]").val("");
                $(".no-comments").remove();
            }
        });
    }

    // 5. DELETE: Background removal
    $(".comment-list").on("click", ".btn-delete-comment", function(e) {
        e.preventDefault();
        var deleteBtn = $(this);
        if (confirm("Delete this comment?")) {
            $.ajax({
                type: 'delete',
                url: deleteBtn.closest("form").attr("action"),
                success: function() {
                    deleteBtn.closest(".comment-card").remove();
                }
            });
        }
    });
</script>

</body>
</html>
