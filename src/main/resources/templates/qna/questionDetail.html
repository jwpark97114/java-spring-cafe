<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cafe - Question Detail</title>
    <th:block th:replace="~{fragments/header :: header-css}"></th:block>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfaf6;
            color: #3e2723;
            display: flex;
            flex-direction: column;
            margin: 0;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        .article-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(109, 76, 65, 0.1);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        .article-meta {
            font-size: 0.9rem;
            font-weight: bold;
            color: #8d6e63;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        h1 {
            margin: 0 0 1.5rem 0;
            color: #4e342e;
            font-size: 2rem;
            line-height: 1.3;
            border-bottom: 2px solid #efebe9;
            padding-bottom: 1rem;
        }
        .article-content {
            font-size: 1.1rem;
            color: #5d4037;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            white-space: pre-wrap;
        }

        /* --- New Button Styles --- */
        .action-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .comment-header {
            display: flex;
            justify-content: space-between; /* This pushes the items to opposite sides */
            align-items: center; /* Vertically centers them */
            margin-bottom: 0.8rem;
            border-bottom: 1px solid #efebe9;
            padding-bottom: 0.5rem;
        }

        .comment-author {
            font-size: 0.95rem;
            font-weight: bold;
            color: #8d6e63;
        }

        .comment-time {
            font-size: 0.85rem;
            color: #a1887f; /* A slightly lighter, muted brown */
        }
        .btn-return {
            display: inline-block;
            text-decoration: none;
            background-color: #8d6e63;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-return:hover {
            background-color: #6d4c41;
        }
        .btn-edit {
            display: inline-block;
            text-decoration: none;
            background-color: #5d4037; /* Darker brown for edit */
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-edit:hover {
            background-color: #3e2723;
        }
        .btn-delete-comment {
            background: none;
            color: #d32f2f; /* Muted red */
            border: none;
            padding: 0;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.3s;
            font-family: inherit;
        }

        .btn-delete-comment:hover {
            color: #b71c1c;
        }
        .btn-delete {
            background-color: #d32f2f; /* Muted red for delete */
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 1rem;
            font-family: inherit;
        }
        .btn-delete:hover {
            background-color: #b71c1c;
        }
        .delete-form {
            margin: 0;
            padding: 0;
        }
        /* --- Comments Section Styles --- */
        .comments-section {
            margin-top: 3rem;
            border-top: 2px solid #efebe9;
            padding-top: 2rem;
        }
        .comments-section h2 {
            font-size: 1.5rem;
            color: #4e342e;
            margin-bottom: 1.5rem;
            margin-top: 0;
            border: none;
            padding: 0;
        }
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .comment-form textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #d7ccc8;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            box-sizing: border-box;
            background-color: #fdfaf6;
            color: #3e2723;
        }
        .comment-form textarea:focus {
            outline: none;
            border-color: #8d6e63;
            box-shadow: 0 0 0 2px rgba(141, 110, 99, 0.2);
        }
        .btn-comment {
            align-self: flex-end;
            background-color: #8d6e63;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 1rem;
            font-family: inherit;
        }
        .btn-comment:hover {
            background-color: #6d4c41;
        }
        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .comment-card {
            background-color: #fdfaf6;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid #8d6e63;
        }
        .comment-meta {
            font-size: 0.9rem;
            font-weight: bold;
            color: #8d6e63;
            margin-bottom: 0.5rem;
        }
        .comment-body {
            font-size: 1rem;
            color: #5d4037;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .no-comments {
            color: #a1887f;
            font-style: italic;
            text-align: center;
            padding: 1rem 0;
        }
        .error-banner {
            background-color: #ffebee;
            color: #c62828;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid #ef9a9a;
            text-align: left;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: main-header}"></div>
<div class="main-content">
    <div class="article-card">

        <div th:if="${errorMessage}" class="error-banner">
            <span th:text="${errorMessage}"> ERROR MESSAGE</span>
        </div>

        <div class="article-meta">
            Question #<span th:text="${article.id}">1</span>
            By <span th:text="${article.author}" style="color: #4e342e;">doe</span>
        </div>

        <h1 th:text="${article.title}">Sample Question Title</h1>

        <div class="article-content" th:text="${article.content}">
            Here is where the detailed explanation of the question will go.
        </div>

        <div class="action-buttons">
            <a href="/qna/" class="btn-return">← Back</a>

            <a th:href="@{/qna/{id}/edit(id=${article.id})}" class="btn-edit">Edit</a>

            <form th:action="@{/qna/{id}/delete(id=${article.id})}" method="post" class="delete-form" onsubmit="return confirm('Are you sure you want to delete this question? This cannot be undone.');">
                <input type="hidden" name="_method" value="DELETE" />
                <button type="submit" class="btn-delete">Delete</button>
            </form>
        </div>
        <div class="comments-section">
            <h2>Comments</h2>

            <form class="comment-form" th:action="@{/qna/{id}/comments(id=${article.id})}" method="post">
                <textarea name="commentContent" placeholder="Leave a comment..." required></textarea>
                <button type="submit" class="btn-comment">Post Comment</button>
            </form>

            <div class="comment-list">
                <div class="comment-card" th:each="comment : ${comments}">

                    <div class="comment-header">
                        <span class="comment-author" th:text="${comment.user.id}">Comment Author</span>

                        <div class="comment-actions" style="display: flex; align-items: center; gap: 1rem;">
                            <span class="comment-time" th:text="${comment.createdAt}">Commented At</span>

                            <form th:if="${session.currentUser != null and session.currentUser.id == comment.user.id}"
                                  th:action="@{/qna/{articleId}/comments/{commentId}/delete(articleId=${article.id}, commentId=${comment.id})}"
                                  method="post"
                                  class="delete-form"
                                  onsubmit="return confirm('Are you sure you want to delete this comment?');">
                                <input type="hidden" name="_method" value="DELETE" />
                                <button type="submit" class="btn-delete-comment">Delete</button>
                            </form>
                        </div>
                    </div>

                    <div class="comment-body" th:text="${comment.reply}">
                        This is a sample comment body.
                    </div>
                </div>

                <div th:if="${comments == null or #lists.isEmpty(comments)}" class="no-comments">
                    No comments yet. Be the first to share your thoughts!
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
